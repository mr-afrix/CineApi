services:
  - type: web
    name: cine-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: TMDB_KEY
        sync: false
      - key: API_KEYS
        sync: false
      - key: CACHE_DB_PATH
        value: /data/cache.sqlite
      - key: PLAYWRIGHT_POOL_SIZE
        value: 2
    disk:
      name: cine-data
      mountPath: /data
      sizeGB: 1
    healthCheckPath: /cn/v1/health
